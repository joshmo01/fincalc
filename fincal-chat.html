<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FinCalAgent — Loan Calculator AI</title>

<!-- React + Babel for no-build JSX -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0b0d;
    --surface:   #111318;
    --surface2:  #181c24;
    --border:    #1e2330;
    --border2:   #2a3044;
    --gold:      #d4a853;
    --gold-dim:  #8a6a2e;
    --gold-glow: rgba(212,168,83,0.15);
    --text:      #e8eaf0;
    --text-dim:  #6b7285;
    --text-muted:#3d4255;
    --green:     #3ddc84;
    --red:       #ff5f5f;
    --blue:      #4a9eff;
    --mono:      'DM Mono', monospace;
    --sans:      'Syne', sans-serif;
  }

  html, body, #root {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: 100vh;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, var(--gold) 0%, #f0c060 100%);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .logo-sub {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 400;
    color: var(--text-dim);
    text-transform: none;
    letter-spacing: 0.02em;
    margin-top: 2px;
  }

  .new-chat-btn {
    margin: 16px 20px 0;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    width: calc(100% - 40px);
    text-align: left;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .new-chat-btn:hover {
    border-color: var(--gold-dim);
    color: var(--gold);
    background: var(--gold-glow);
  }

  .sessions-label {
    padding: 16px 20px 8px;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 500;
  }

  .sessions-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .session-item {
    padding: 9px 12px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.1s;
    color: var(--text-dim);
    font-size: 11px;
    border: 1px solid transparent;
  }
  .session-item:hover { background: var(--surface2); color: var(--text); }
  .session-item.active {
    background: var(--gold-glow);
    border-color: var(--gold-dim);
    color: var(--gold);
  }
  .session-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    flex-shrink: 0;
  }
  .session-item.active .session-dot { background: var(--gold); }

  .sidebar-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
  }

  .server-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    color: var(--text-dim);
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: background 0.3s;

  .status-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }

  .server-url-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 10px;
    padding: 5px 8px;
    border-radius: 4px;
    width: 100%;
    margin-top: 8px;
    outline: none;

  .server-url-input:focus { border-color: var(--gold-dim); color: var(--text); }

  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* ── Top bar ── */
  .topbar {
    padding: 0 28px;
    height: 52px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: var(--surface);

  .topbar-title {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .topbar-btn {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 10px;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }
  .topbar-btn:hover { border-color: var(--gold-dim); color: var(--gold); background: var(--gold-glow); }
  .topbar-btn.danger:hover { border-color: var(--red); color: var(--red); background: rgba(255,95,95,0.1); }

  /* ── Messages ── */
  .messages-wrap {
    flex: 1;
    overflow-y: auto;
    scroll-behavior: smooth;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .messages-inner {
    max-width: 860px;
    margin: 0 auto;
    padding: 28px 28px 12px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* ── Welcome screen ── */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 40px;
    text-align: center;
    gap: 20px;
  }

  .welcome-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--gold) 0%, #f0c060 100%);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    box-shadow: 0 8px 32px rgba(212,168,83,0.25);
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

  .welcome-title {
    font-family: var(--sans);
    font-size: 26px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .welcome-sub {
    font-size: 12px;
    color: var(--text-dim);
    max-width: 420px;
    line-height: 1.8;
  }

  .examples-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    width: 100%;
    max-width: 600px;
    margin-top: 8px;
  }

  .example-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    font-family: var(--mono);
  }
  .example-card:hover {
    border-color: var(--gold-dim);
    background: var(--gold-glow);
    transform: translateY(-1px);
  }
  .example-card-label {
    font-size: 9px;
    color: var(--gold);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .example-card-text {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  /* ── Message rows ── */
  .msg-row {
    display: flex;
    gap: 12px;
    padding: 12px 0;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    margin-top: 2px;
  }
  .msg-avatar.user {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text-dim);
    font-family: var(--sans);
  }
  .msg-avatar.agent {
    background: linear-gradient(135deg, var(--gold) 0%, #e8b84b 100%);
    color: #0a0b0d;
  }

  .msg-body { flex: 1; min-width: 0; }

  .msg-role {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .msg-role.user { color: var(--text-dim); }
  .msg-role.agent { color: var(--gold); }

  .msg-time {
    font-size: 9px;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 0.02em;
    text-transform: none;
  }

  .msg-content {
    color: var(--text);
    font-size: 13px;
    line-height: 1.75;
    word-break: break-word;
  }

  .msg-content.user-text {
    color: var(--text-dim);
    font-style: italic;
  }

  /* ── Preformatted / table blocks ── */
  .msg-content pre,
  .msg-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold-dim);
    border-radius: 6px;
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 11.5px;
    line-height: 1.65;
    overflow-x: auto;
    white-space: pre;
    color: var(--text);
    margin: 8px 0;
    letter-spacing: 0.01em;
  }

  /* ── Metrics pills ── */
  .metrics-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 8px 0;
  }
  .metric-pill {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 5px 10px;
    font-size: 11px;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .metric-pill-label {
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .metric-pill-value {
    color: var(--gold);
    font-weight: 500;
  }

  /* ── Typing indicator ── */
  .typing-row { display: flex; gap: 12px; padding: 12px 0; }
  .typing-dots {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 8px 0;
  }
  .typing-dots span {
    width: 5px; height: 5px;
    background: var(--gold-dim);
    border-radius: 50%;
    animation: dot 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot {
    0%,60%,100%{transform:translateY(0);opacity:0.4}
    30%{transform:translateY(-4px);opacity:1}
  }

  /* ── Input area ── */
  .input-area {
    padding: 16px 28px 20px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }

  .input-wrap {
    max-width: 860px;
    margin: 0 auto;
    position: relative;
  }

  .input-box {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    padding: 12px 52px 12px 16px;
    resize: none;
    outline: none;
    min-height: 48px;
    max-height: 160px;
    transition: border-color 0.15s;
    overflow-y: auto;
    scrollbar-width: none;
  }
  .input-box:focus { border-color: var(--gold-dim); }
  .input-box::placeholder { color: var(--text-muted); }

  .send-btn {
    position: absolute;
    right: 10px;
    bottom: 10px;
    width: 30px; height: 30px;
    background: var(--gold);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #0a0b0d;
    font-size: 14px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #e8c060; transform: scale(1.05); }
  .send-btn:disabled { background: var(--border2); color: var(--text-muted); cursor: not-allowed; transform: none; }

  .input-hint {
    margin-top: 8px;
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 0.03em;
  }

  /* ── Error toast ── */
  .error-toast {
    background: rgba(255,95,95,0.12);
    border: 1px solid rgba(255,95,95,0.3);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 11px;
    color: var(--red);
    margin: 0 28px 12px;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── Mobile responsive ── */
  @media (max-width: 680px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .messages-inner { padding: 16px; }
    .input-area { padding: 12px 16px 16px; }
    .examples-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Utilities ─────────────────────────────────────────────────────────────────

function genId() {
  return Math.random().toString(36).slice(2, 9);
}

function now() {
  return new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
}

// Detect and highlight preformatted blocks (the ═══ bordered sections from fincal-summary)
function renderAgentContent(text) {
  if (!text) return null;
  
  // Split on blocks that start with ═ or ─ borders
  const parts = [];
  const lines = text.split('\n');
  let blockLines = [];
  let textLines = [];
  let inBlock = false;

  const flushText = () => {
    if (textLines.length > 0) {
      const joined = textLines.join('\n').trim();
      if (joined) parts.push({ type: 'text', content: joined });
      textLines = [];
    }
  };
  const flushBlock = () => {
    if (blockLines.length > 0) {
      parts.push({ type: 'pre', content: blockLines.join('\n') });
      blockLines = [];
    }
  };

  for (const line of lines) {
    const isBox = /^[═─╔╚╗╝║│┌└┐┘├┤┬┴┼]/.test(line.trim());
    if (isBox) {
      if (!inBlock) { flushText(); inBlock = true; }
      blockLines.push(line);
    } else if (inBlock) {
      // continue block if it looks structured (has │ or ─ patterns)
      if (/[═─│]/.test(line) || line.startsWith('  ')) {
        blockLines.push(line);
      } else {
        flushBlock();
        inBlock = false;
        textLines.push(line);
      }
    } else {
      textLines.push(line);
    }
  }
  flushBlock();
  flushText();

  return parts.map((part, i) => {
    if (part.type === 'pre') {
      return <pre key={i}>{part.content}</pre>;
    }
    // Render text with basic bold/emphasis
    const html = part.content
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/`(.+?)`/g, '<code style="background:#181c24;padding:1px 5px;border-radius:3px;font-size:11px">$1</code>');
    return (
      <p key={i} dangerouslySetInnerHTML={{ __html: html }}
        style={{ marginBottom: 6, color: 'var(--text)' }} />
    );
  });
}

// ── Components ────────────────────────────────────────────────────────────────

function Avatar({ role }) {
  return (
    <div className={`msg-avatar ${role}`}>
      {role === 'user' ? 'U' : '₹'}
    </div>
  );
}

function Message({ msg }) {
  return (
    <div className="msg-row">
      <Avatar role={msg.role} />
      <div className="msg-body">
        <div className={`msg-role ${msg.role}`}>
          {msg.role === 'user' ? 'You' : 'FinCalAgent'}
          <span className="msg-time">{msg.time}</span>
        </div>
        <div className="msg-content">
          {msg.role === 'user'
            ? <span className="user-text">{msg.content}</span>
            : renderAgentContent(msg.content)
          }
        </div>
      </div>
    </div>
  );
}

function TypingIndicator() {
  return (
    <div className="typing-row">
      <div className="msg-avatar agent">₹</div>
      <div className="msg-body">
        <div className="msg-role agent">FinCalAgent <span className="msg-time">calculating…</span></div>
        <div className="typing-dots">
          <span/><span/><span/>
        </div>
      </div>
    </div>
  );
}

const EXAMPLES = [
  { label: 'Simple EMI', text: 'EMI for 50 Lakh at 15% for 12 years' },
  { label: 'Step-Up', text: '10L loan at 15% for 10 years with 1 year moratorium, then step up 15% after year 2' },
  { label: 'Compare', text: 'Compare flat EMI vs step-up 10% after year 5 for 25L at 12% for 10 years' },
  { label: 'With Fees', text: 'EMI for 20 Lakh at 11.5% for 5 years with processing fee of 10000' },
];

function Welcome({ onExample }) {
  return (
    <div className="welcome">
      <div className="welcome-icon">₹</div>
      <div>
        <div className="welcome-title">FinCalAgent</div>
        <div style={{ fontFamily: 'var(--sans)', fontSize: 11, color: 'var(--gold)', letterSpacing: '0.15em', textTransform: 'uppercase', marginTop: 4 }}>
          Loan Calculator AI
        </div>
      </div>
      <div className="welcome-sub">
        Ask anything about loan calculations — EMI, step-up schedules, moratorium structures, balloon payments, or comparisons.
      </div>
      <div className="examples-grid">
        {EXAMPLES.map((ex) => (
          <button key={ex.label} className="example-card" onClick={() => onExample(ex.text)}>
            <div className="example-card-label">{ex.label}</div>
            <div className="example-card-text">{ex.text}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────

function App() {
  const [sessions, setSessions]     = useState([{ id: 'default', label: 'Session 1' }]);
  const [activeId, setActiveId]     = useState('default');
  const [allMessages, setAllMsgs]   = useState({ default: [] });
  const [input, setInput]           = useState('');
  const [loading, setLoading]       = useState(false);
  const [error, setError]           = useState('');
  const [serverUrl, setServerUrl]   = useState('http://localhost:3000');
  const [isOnline, setIsOnline]     = useState(false);
  const [editUrl, setEditUrl]       = useState(false);

  const bottomRef  = useRef(null);
  const inputRef   = useRef(null);
  const messages   = allMessages[activeId] || [];

  // ── Health check ────────────────────────────────────────────────────────────
  useEffect(() => {
    let interval;
    const check = async () => {
      try {
        const r = await fetch(`${serverUrl}/health`, { signal: AbortSignal.timeout(3000) });
        setIsOnline(r.ok);
      } catch { setIsOnline(false); }
    };
    check();
    interval = setInterval(check, 5000);
    return () => clearInterval(interval);
  }, [serverUrl]);

  // ── Auto-scroll ──────────────────────────────────────────────────────────────
  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, loading]);

  // ── Send message ─────────────────────────────────────────────────────────────
  const send = useCallback(async (text) => {
    const q = (text || input).trim();
    if (!q || loading) return;
    setInput('');
    setError('');

    const userMsg = { id: genId(), role: 'user', content: q, time: now() };
    setAllMsgs(prev => ({
      ...prev,
      [activeId]: [...(prev[activeId] || []), userMsg]
    }));

    setLoading(true);
    try {
      const res = await fetch(`${serverUrl}/calculate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: q, session_id: activeId }),
      });

      if (!res.ok) throw new Error(`Server returned ${res.status}`);
      const data = await res.json();

      const agentMsg = {
        id: genId(),
        role: 'agent',
        content: data.response || 'No response from agent.',
        time: now()
      };
      setAllMsgs(prev => ({
        ...prev,
        [activeId]: [...(prev[activeId] || []), agentMsg]
      }));
    } catch (e) {
      setError(e.message.includes('fetch') || e.message.includes('Failed')
        ? `Cannot connect to server at ${serverUrl}. Is it running? (node src/server.js)`
        : e.message
      );
    } finally {
      setLoading(false);
      setTimeout(() => inputRef.current?.focus(), 100);
    }
  }, [input, loading, activeId, serverUrl]);

  // ── New session ──────────────────────────────────────────────────────────────
  const newSession = () => {
    const id    = genId();
    const label = `Session ${sessions.length + 1}`;
    setSessions(prev => [...prev, { id, label }]);
    setAllMsgs(prev => ({ ...prev, [id]: [] }));
    setActiveId(id);
    setError('');
    setTimeout(() => inputRef.current?.focus(), 100);
  };

  // ── Reset session ─────────────────────────────────────────────────────────────
  const resetSession = async () => {
    try {
      await fetch(`${serverUrl}/reset`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: activeId }),
      });
    } catch {}
    setAllMsgs(prev => ({ ...prev, [activeId]: [] }));
    setError('');
  };

  // ── Keyboard shortcuts ────────────────────────────────────────────────────────
  const onKeyDown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  };

  const activeSession = sessions.find(s => s.id === activeId);

  return (
    <div className="layout">
      {/* Sidebar */}
      <div className="sidebar">
        <div className="sidebar-header">
          <div className="logo">
            <div className="logo-icon">₹</div>
            <div>
              FinCalAgent
              <div className="logo-sub">Loan Calculator AI</div>
            </div>
          </div>
        </div>

        <button className="new-chat-btn" onClick={newSession}>
          <span>+</span> New Session
        </button>

        <div className="sessions-label">Sessions</div>
        <div className="sessions-list">
          {sessions.map(s => (
            <div
              key={s.id}
              className={`session-item ${s.id === activeId ? 'active' : ''}`}
              onClick={() => { setActiveId(s.id); setError(''); }}
            >
              <div className="session-dot" />
              <span>{s.label}</span>
              {allMessages[s.id]?.length > 0 && (
                <span style={{ marginLeft: 'auto', fontSize: 9, color: 'var(--text-muted)' }}>
                  {Math.ceil(allMessages[s.id].length / 2)}
                </span>
              )}
            </div>
          ))}
        </div>

        <div className="sidebar-footer">
          <div className="server-status">
            <div className={`status-dot ${isOnline ? 'online' : 'offline'}`} />
            <span>{isOnline ? 'Server online' : 'Server offline'}</span>
            <button
              onClick={() => setEditUrl(v => !v)}
              style={{ marginLeft: 'auto', background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', fontSize: 10 }}>
              {editUrl ? '✕' : 'edit'}
            </button>
          </div>
          {editUrl && (
            <input
              className="server-url-input"
              value={serverUrl}
              onChange={e => setServerUrl(e.target.value)}
              placeholder="http://localhost:3000"
              spellCheck={false}
            />
          )}
        </div>
      </div>

      {/* Main */}
      <div className="main">
        {/* Topbar */}
        <div className="topbar">
          <div className="topbar-title">{activeSession?.label || 'Chat'}</div>
          <div className="topbar-actions">
            <button className="topbar-btn danger" onClick={resetSession}>
              RESET SESSION
            </button>
          </div>
        </div>

        {/* Messages */}
        <div className="messages-wrap">
          {messages.length === 0 && !loading ? (
            <Welcome onExample={(t) => { setInput(t); setTimeout(() => send(t), 50); }} />
          ) : (
            <div className="messages-inner">
              {messages.map(msg => <Message key={msg.id} msg={msg} />)}
              {loading && <TypingIndicator />}
              <div ref={bottomRef} style={{ height: 1 }} />
            </div>
          )}
        </div>

        {/* Error */}
        {error && (
          <div className="error-toast">
            ⚠ {error}
          </div>
        )}

        {/* Input */}
        <div className="input-area">
          <div className="input-wrap">
            <textarea
              ref={inputRef}
              className="input-box"
              value={input}
              onChange={e => {
                setInput(e.target.value);
                e.target.style.height = 'auto';
                e.target.style.height = Math.min(e.target.scrollHeight, 160) + 'px';
              }}
              onKeyDown={onKeyDown}
              placeholder="Ask about any loan structure…  (Enter to send, Shift+Enter for new line)"
              rows={1}
              disabled={loading}
              spellCheck={false}
            />
            <button
              className="send-btn"
              onClick={() => send()}
              disabled={loading || !input.trim()}
              title="Send (Enter)"
            >
              {loading ? '…' : '↑'}
            </button>
          </div>
          <div className="input-hint">
            Enter to send · Shift+Enter for new line · Reset clears context
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
